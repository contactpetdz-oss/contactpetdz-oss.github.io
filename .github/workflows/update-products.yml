name: Update Products

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch products
        env:
          TEMU_AFFILIATE_ID: ${{ secrets.TEMU_AFFILIATE_ID }}
          ALI_TRACKING_ID: ${{ secrets.ALI_TRACKING_ID }}
        run: python fetch_products.py

      - name: Commit products.json
        run: |
          git config user.name "PetDZ Bot"
          git config user.email "contact.petdz@gmail.com"
          git add products.json
          git diff --staged --quiet || git commit -m "Auto-update products $(date '+%Y-%m-%d')"
          git push
