*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf8f5;--card:#fff;--border:#ede9e3;--accent:#e85d04;--flash:#d00000;--green:#2d6a4f;--text:#1a1a1a;--muted:#8a8a8a;--premium:#7b2d8b;--warm:#fff8f0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(250,248,245,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;cursor:pointer;color:var(--text);letter-spacing:-.02em}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:2px}
.nl{padding:7px 14px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:.82rem;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;transition:all .2s}
.nl:hover{color:var(--text);background:#f0ece6}
.nl.active{color:var(--accent);background:#fff0e8}
.nl.pnav{color:var(--premium)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-badge{background:var(--accent);color:#fff;font-size:.7rem;font-weight:600;padding:5px 13px;border-radius:999px}

/* PAGES */
.page{display:none}.page.active{display:block}

/* TICKER */
.ticker{background:var(--accent);color:#fff;padding:10px 0;overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-flex;animation:tick 32s linear infinite}
@keyframes tick{to{transform:translateX(-50%)}}
.ticker-inner span{font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;padding:0 28px;opacity:.9}
.ticker-inner span.dot{padding:0 8px;opacity:.5}

.hero-left .tag::before{content:'';width:24px;height:2px;background:var(--accent);display:inline-block}

.hero-left h1 em{font-style:normal;color:var(--accent);display:block}

.hero-stats{display:flex;gap:32px}
.stat{border-left:3px solid var(--accent);padding-left:14px}

.stat-l{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:3px}
